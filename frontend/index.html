<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Anomaly Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Log Anomaly Detector</h1>
        <p>Upload your system logs to detect anomalies and inconsistent data leaks using AI.</p>

        <div class="upload-section">
            <input type="file" id="logFileInput" accept=".log, .txt, .csv">
            <button id="analyzeBtn" onclick="analyzeLogs()">Analyze Logs</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing logs... this may take a moment.</p>
        </div>

        <div id="resultsSection" class="results-container hidden">
            <h2>Analysis Results</h2>
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Logs</h3>
                    <p id="totalLogs">--</p>
                </div>
                <div class="card warning">
                    <h3>Anomalies Detected</h3>
                    <p id="anomaliesDetected">--</p>
                </div>
            </div>

            <h3>Anomaly Details</h3>
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Line #</th>
                            <th>Log Content</th>
                            <th>Anomaly Score</th>
                            <th>Prediction</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <!-- Results injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
